<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local</title>
  <link rel="shortcut icon" href="favicon.ico" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="index.css?v=3" />

  <script src="scramjet-app/src/scramjet.all.js"></script>
  <script src="scramjet-app/src/baremux/index.js"></script>
  <script src="register-sw.js?v=3" defer></script>
  <script src="index.js?v=3" defer></script>
</head>
<body class="theme-snow">
  <canvas id="snow-canvas"></canvas>

  <div class="announce-strip" id="announce-strip" style="display:none">
    <span class="announce-icon" id="announce-icon">📢</span>
    <span class="announce-text" id="announce-text"></span>
    <button class="announce-dismiss" id="announce-dismiss" title="Dismiss">✕</button>
  </div>

  <div class="widgets-bar">
    <div class="clock-widget">
      <div class="clock-time" id="clock-time">00:00:00</div>
      <div class="clock-date" id="clock-date">Loading…</div>
    </div>
    <div class="weather-widget" id="weather-widget">
      <span class="weather-loading">📍 Getting location…</span>
    </div>
  </div>

  <main class="main-content">
    <h1 class="site-title">Local</h1>
    <p class="site-subtitle">your space</p>

    <div class="nav-buttons">
      <button class="nav-btn games-btn" id="games-btn">
        <div class="btn-glow"></div>
        <span class="btn-icon">🎮</span>
        <span class="btn-label">Games</span>
        <div class="btn-shine"></div>
      </button>
      <button class="nav-btn movies-btn" id="movies-btn">
        <div class="btn-glow"></div>
        <span class="btn-icon">🎬</span>
        <span class="btn-label">Movies</span>
        <div class="btn-shine"></div>
      </button>
      <button class="nav-btn music-btn" id="music-btn">
        <div class="btn-glow"></div>
        <span class="btn-icon">🎵</span>
        <span class="btn-label">Music</span>
        <div class="btn-shine"></div>
      </button>
    </div>

    <div class="tips-row" id="tips-row"></div>

    <form class="home-search-form" id="home-search-form" autocomplete="off">
      <select class="home-engine" id="home-engine">
        <option value="google">Google</option>
        <option value="ddg">DuckDuckGo</option>
        <option value="bing">Bing</option>
      </select>
      <input class="home-search-input" id="home-search-input" type="text"
        placeholder="Search the web or enter a URL…" spellcheck="false" />
      <button class="home-search-go" type="submit">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </form>
  </main>

  <div class="bottom-bar">
    <button class="icon-btn" id="devlog-btn" title="Devlog">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </button>
    <button class="icon-btn" id="admin-btn" title="Admin">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </button>
    <button class="icon-btn" id="fullscreen-btn" title="Fullscreen">
      <svg id="fs-expand" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <svg id="fs-shrink" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
    </button>
    <button class="icon-btn" id="settings-btn" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div class="settings-overlay" id="settings-overlay"></div>
  <div class="settings-panel" id="settings-panel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="settings-close" id="settings-close">✕</button>
    </div>

    <div class="settings-section">
      <h3>🎭 Tab Cloak</h3>
      <p class="settings-desc">Change how this tab looks to others</p>
      <div class="tab-presets">
        <button class="preset-btn" data-title="Google" data-icon="https://www.google.com/favicon.ico">Google</button>
        <button class="preset-btn" data-title="Khan Academy" data-icon="https://www.khanacademy.org/favicon.ico">Khan Academy</button>
        <button class="preset-btn" data-title="Google Classroom" data-icon="https://ssl.gstatic.com/classroom/favicon.png">Classroom</button>
        <button class="preset-btn" data-title="Canvas LMS" data-icon="https://du11hjcvx0uqb.cloudfront.net/favicon.ico">Canvas</button>
      </div>
      <div class="input-group">
        <label>Tab Title</label>
        <input type="text" id="tab-title-input" placeholder="Custom title…" />
      </div>
      <div class="input-group">
        <label>Favicon URL</label>
        <input type="text" id="tab-icon-input" placeholder="https://example.com/favicon.ico" />
      </div>
      <button class="apply-btn" id="apply-cloak">Apply Cloak</button>
      <button class="reset-btn" id="reset-cloak">Reset to Default</button>
    </div>

    <div class="settings-section">
      <h3>🎨 Themes</h3>
      <div class="theme-grid">
        <button class="theme-btn" data-theme="snow">
          <div class="theme-preview snow-preview"></div>
          <span>Night Snow</span>
        </button>
        <button class="theme-btn" data-theme="forest">
          <div class="theme-preview forest-preview"></div>
          <span>Forest</span>
        </button>
        <button class="theme-btn" data-theme="sunset">
          <div class="theme-preview sunset-preview"></div>
          <span>Sunset</span>
        </button>
        <button class="theme-btn" data-theme="space">
          <div class="theme-preview space-preview"></div>
          <span>Space</span>
        </button>
      </div>
    </div>

    <div class="settings-section">
      <h3>🚨 Panic Button</h3>
      <p class="settings-desc">Instantly navigate away. Press <kbd>Esc</kbd> anywhere.</p>
      <div class="input-group">
        <label>Redirect URL</label>
        <input type="text" id="panic-url-input" value="https://classroom.google.com" />
      </div>
      <button class="panic-btn" id="panic-btn">🚨 PANIC NOW</button>
    </div>
  </div>

  <div class="proxy-overlay" id="proxy-overlay">
    <div class="overlay-bar">
      <button class="overlay-close" id="overlay-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
      <form class="addr-bar" id="addr-bar" autocomplete="off">
        <select class="addr-engine" id="addr-engine">
          <option value="google">Google</option>
          <option value="ddg">DuckDuckGo</option>
          <option value="bing">Bing</option>
        </select>
        <input class="addr-input" id="addr-input" type="text" placeholder="Search or enter a URL…" spellcheck="false" />
        <button class="addr-go" type="submit">Go</button>
      </form>
    </div>
    <div class="overlay-content" id="overlay-content"></div>
  </div>
</body>
</html>
